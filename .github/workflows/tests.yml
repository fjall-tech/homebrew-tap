name: brew test-bot

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  # fjall is a no-bottle node formula (npm install + symlink), so there is
  # nothing to compile or bottle. This is a fast advisory formula-syntax check
  # on ubuntu only; the macOS bottle matrix was removed because it queued
  # indefinitely on the public runners and the merge no longer depends on it.
  test-bot:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ubuntu-24.04-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ubuntu-24.04-rubygems-

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax
