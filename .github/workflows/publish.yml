name: auto-merge formula update

on:
  pull_request_target:
    types:
      - labeled

permissions: {}

jobs:
  merge:
    # Only the npm-release bot's labelled, same-repo update-<version> branch.
    # head.repo == base.repo refuses fork PRs (defence-in-depth on the
    # pull_request_target write permissions); the step never checks out or runs
    # PR code, it only calls the merge API.
    if: >-
      contains(github.event.pull_request.labels.*.name, 'pr-pull')
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Squash-merge the labelled formula PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: gh pr merge "$PR" --repo "$GITHUB_REPOSITORY" --squash --delete-branch
